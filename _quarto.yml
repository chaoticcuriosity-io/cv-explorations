project:
  type: website
  output-dir: _site

website:
  title: "CV Explorations"
  description: "A hands-on, benchmark-driven tour of modern computer-vision capabilities."
  repo-url: https://github.com/chaoticcuriosity-io/cv-explorations
  repo-actions: [source, issue]
  page-footer: "Built with Quarto · experiments run locally on an RTX 3090 Ti"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - text: Modules
        menu:
          - href: modules/01-object-detection/report.qmd
            text: "01 · Object detection"
          - href: modules/02-classification/report.qmd
            text: "02 · Image classification"
          - href: modules/03-segmentation/report.qmd
            text: "03 · Segmentation"
          - href: modules/04-depth/report.qmd
            text: "04 · Monocular depth"
          - href: modules/05-pose/report.qmd
            text: "05 · Human pose"
          - href: modules/06-tracking/report.qmd
            text: "06 · Tracking"
          - href: modules/07-retrieval/report.qmd
            text: "07 · Embeddings & retrieval"
          - href: modules/08-vlm/report.qmd
            text: "08 · Vision-language models"
          - href: modules/09-classical/report.qmd
            text: "09 · Classical CV"
    right:
      - icon: github
        href: https://github.com/chaoticcuriosity-io/cv-explorations
        aria-label: GitHub

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    fig-responsive: true

# Run heavy CV code once locally; commit results under _freeze/ so CI renders
# the site without a GPU. New module reports get added to the navbar as built.
execute:
  freeze: auto
